    source: https://link.springer.com/article/10.1007/s42001-026-00465-4#ref-CR39
    snippet_or_summary: The simulation results demonstrated that the inclusion of
      the FCLAgents enables the emergence of empirically observed market anomalies,
      such as the negative correlation between proximity to the all-time high and
      future returns
  - type: text
    source: https://www.sciencedirect.com/science/article/abs/pii/S0304405X11002121?via%3Dihub
    snippet_or_summary: We find that nearness to the 52-week high positively predicts
      future aggregate market returns, while nearness to the historical high negatively
      predicts future market returns. We further show that our proxies contain information
      about future market returns that is not captured by traditional macroeconomic
      variables and that our results are robust across G7 countries. Comprehensive
      Monte Carlo simulations and comparisons with the NYSE/Amex market cap index
      confirm the significance of these findings.
    page: '401'
