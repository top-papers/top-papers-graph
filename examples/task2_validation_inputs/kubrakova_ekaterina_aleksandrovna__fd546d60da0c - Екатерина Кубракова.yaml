steps:
- step_id: 1
  claim: 'Традиционные агентные модели (ABM) сталкиваются с фундаментальной проблемой
    при моделировании поведенческих предубеждений инвесторов, поскольку эти предубеждения
    являются контекстно-зависимыми: их проявления варьируются не только в зависимости
    от текущих рыночных условий, но и от таких факторов, как индивидуальная история
    торговли или среда, в которой действует инвестор.'
  sources:
  - type: text
    source: doi:10.1007/s42001-026-00465-4
    snippet_or_summary: Despite their utility, artificial markets face a significant
      challenge in incorporating context-dependent behavioral biases into agents,
      limiting their ability to fully capture real-world financial dynamics
  - type: text
    source: https://www.nature.com/articles/460685a
    snippet_or_summary: The economy needs agent-based modeling.
  conditions:
    system: unknown
    environment: unknown
    protocol: unknown
    notes: Проблема особенно остра для двух ключевых предубеждений — неприятия потерь
      и стадного поведения
  inference: Необходим принципиально новый подход к моделированию поведения инвесторов,
    который сможет улавливать сложные нюансы поведенческих предубеждений, зависящие
    от контекста.
  next_question: Могут ли большие языковые модели (LLM), обученные на огромных массивах
    человеческих текстов, служить основой для таких агентов?
- step_id: 2
  claim: Поскольку LLM обучаются на разнообразных текстах, созданных людьми, существует
    предположение, что они могут демонстрировать поведенческие предубеждения, схожие
    с человеческими, включая неприятие потерь и стадное поведение
  sources:
  - type: text
    source: doi:10.1007/s42001-026-00465-4
    snippet_or_summary: Since LLMs are trained on diverse human-generated texts, there
      is growing speculation that they may exhibit behavioral biases similar to those
      of humans
  - type: text
    source: https://www.nature.com/articles/s43588-023-00527-x
    snippet_or_summary: The results show that as the models expand in size and linguistic
      proficiency they increasingly display human-like intuitive system 1 thinking
      and associated cognitive errors.
    page: '833'
  conditions:
    system: unknown
    environment: unknown
    protocol: unknown
    notes: ''
  inference: Если гипотеза подтвердится, LLM-агенты могут стать прорывом в многоагентных
    рыночных симуляциях, воспроизводя более человекоподобные паттерны поведения.
  next_question: Как систематически проанализировать контекстно-зависимую природу
    предубеждений LLM?
- step_id: 3
  claim: 'Для исследования контекстно-зависимой природы предубеждений LLM авторы разработали
    двухэтапный подход: (1) микроанализ — контролируемые торговые эксперименты для
    тестирования контекстно-зависимых предубеждений LLM, и (2) макроанализ — внедрение
    LLM-агентов в искусственный рынок для многоагентных симуляций'
  sources:
  - type: text
    source: https://link.springer.com/article/10.1007/s42001-026-00465-4#Bib1
    snippet_or_summary: 'Our analysis proceeds in two stages. Micro analysis: we run
      controlled trading experiments... Macro analysis: we introduce the LLM-based
      agents in an artificial market..."'
    locator: Figure 1
  conditions:
    system: unknown
    environment: unknown
    protocol: unknown
    notes: Микроанализ фокусируется на отдельных решениях, макроанализ — на эмерджентных
      рыночных явлениях
  inference: Такой подход позволяет связать микро-уровень индивидуальных предубеждений
    с макро-уровнем рыночных аномалий.
  next_question: Что показал микроанализ относительно неприятия потерь у LLM?
- step_id: 4
  claim: В микроанализе авторы обнаружили, что LLM могут демонстрировать неприятие
    потерь с варьирующимися точками отсчета (reference points) в зависимости от контекста.
    Анализ проводился в четырех различных контекстах с разными потенциальными точками
    отсчета в однораундовых симуляциях
  sources:
  - type: text
    source: https://link.springer.com/article/10.1007/s42001-026-00465-4#Bib1
    snippet_or_summary: For loss aversion, we analyzed LLMs' decision-making across
      four different contexts with varying potential reference points in single-turn
      simulations
  conditions:
    system: unknown
    environment: unknown
    protocol: unknown
    notes: Точки отсчета включали цену покупки, исторический максимум, исторический
      минимум и другие контекстуальные факторы
  inference: LLM способны менять свою точку отсчета для оценки прибылей и убытков
    в зависимости от контекста, что критически важно для моделирования эффекта диспозиции.
  next_question: Как LLM ведут себя в отношении стадного поведения?
- step_id: 5
  claim: Для стадного поведения авторы провели многоагентные симуляции, чтобы оценить,
    могут ли дисбаланс потока заявок (OFI) и лидерборд (информация об успешных инвесторах)
    служить стимулами для проявления LLM стадного поведения. Результаты показали,
    что LLM-агенты демонстрируют стадное поведение под влиянием обоих факторов
  sources:
  - type: text
    source: https://link.springer.com/article/10.1007/s42001-026-00465-4#Bib1
    snippet_or_summary: For herd behavior, we conducted multi-agent simulations to
      assess whether order flow imbalance (OFI) and the leader-board... could serve
      as stimuli for LLMs to exhibit herding behavior
  - type: text
    source: https://www.sciencedirect.com/science/article/pii/S016726812200316X?via%3Dihub
    snippet_or_summary: We provide novel evidence about herd behavior and its impact
      on asset price bubbles in an experimental financial market. We find that traders
      imitate quotes of those with the highest wealth increases as ranked on the leader-boards,
      despite that no traders possess private value-related information and that wealth
      increases are not due to trading skills.
    page: '93'
  conditions:
    system: unknown
    environment: unknown
    protocol: unknown
    notes: Проводились многоагентные симуляции для анализа влияния OFI и лидерборда
