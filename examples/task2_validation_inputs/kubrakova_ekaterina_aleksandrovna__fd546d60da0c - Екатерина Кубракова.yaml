    людях
  next_question: Как эти находки интегрировать в работающую модель искусственного
    рынка?
- step_id: 6
  claim: На основе полученных результатов авторы предложили novel agent model — Fundamental-Chartist-LLM-Agent
    (FCLAgent), который интегрирует контекстно-зависимые поведенческие предубеждения
