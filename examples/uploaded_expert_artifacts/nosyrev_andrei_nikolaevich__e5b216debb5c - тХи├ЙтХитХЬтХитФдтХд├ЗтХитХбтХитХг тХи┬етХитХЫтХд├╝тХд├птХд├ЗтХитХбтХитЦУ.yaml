  sources:
  - type: text
    source: https://doi.org/10.1002/2015JA021047
    snippet_or_summary: '"We examine 1967–2005 thermospheric mass density trends derived
      from satellite orbit data, as a function of altitude, solar ﬂux, and geomagnetic
      activity. At 400 km altitude, the estimated 1967–2005 trend is -2.0 ± 0.5% per
      decade. The estimated trends become increasingly negative with increasing height
      between 250 and 575 km, suggesting an exospheric temperature trend of -1 to
      -2 K per decade."


      Перевод: Мы исследуем тенденции изменения плотности массы термосферы в период
      1967–2005 годов, полученные на основе данных об орбитах спутников, в зависимости
      от высоты, солнечного потока и геомагнитной активности. На высоте 400 км оценочная
      тенденция за период 1967–2005 годов составляет -2,0 ± 0,5% за десятилетие. Оценочные
      тенденции становятся все более отрицательными с увеличением высоты в диапазоне
      от 250 до 575 км, что указывает на тенденцию изменения температуры экзосферы
      от -1 до -2 К за десятилетие.'
