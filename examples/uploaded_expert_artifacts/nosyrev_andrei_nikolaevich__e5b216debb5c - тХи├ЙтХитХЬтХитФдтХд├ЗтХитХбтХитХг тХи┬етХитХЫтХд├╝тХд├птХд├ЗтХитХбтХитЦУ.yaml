- step_id: 2
  claim: Увеличение концентрации CO2 в атмосфере приводит к снижению температуры и
    плотности термосферы
  sources:
  - type: text
    source: https://doi.org/10.1002/2015JA021047
    snippet_or_summary: '"Infrared emission in the lower thermosphere by CO2 is a
      key mechanism by which the entire thermosphere sheds the ultraviolet energy
      it absorbs from the Sun. CO2 therefore contributes signiﬁcantly to the maintenance
      of approximate thermal equilibrium in the thermosphere. Because the emission
      rate is proportional to the concentration of CO2, anthropogenic increases in
      its thermospheric concentration are expected to result in a cooler, more contracted
      thermosphere, and consequently lower mass density at ﬁxed altitudes; similar
      enhanced CO2 cooling in the stratosphere and mesosphere will further reduce
      density by lowering the height of the base of thermosphere."


      Перевод: Инфракрасное излучение в нижней термосфере, вызываемое CO2, является
      ключевым механизмом, посредством которого вся термосфера отводит поглощенную
      Солнцем ультрафиолетовую энергию. Таким образом, CO2 вносит значительный вклад
      в поддержание приблизительного теплового равновесия в термосфере. Поскольку
      скорость излучения пропорциональна концентрации CO2, ожидается, что антропогенное
      увеличение его концентрации в термосфере приведет к более холодной термосфере
      и, следовательно, к снижению плотности массы на фиксированных высотах; аналогичное
      усиленное охлаждение CO2 в стратосфере и мезосфере еще больше снизит плотность
      за счет уменьшения высоты основания термосферы.'
