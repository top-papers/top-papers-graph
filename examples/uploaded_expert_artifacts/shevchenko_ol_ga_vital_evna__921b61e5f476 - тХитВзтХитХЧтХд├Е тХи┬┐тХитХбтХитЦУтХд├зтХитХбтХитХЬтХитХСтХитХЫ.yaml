topic: Противогрибковый механизм действия пептидов, полученных из EntV
domain: Q7202
cutoff_year: 2025
papers:
- id: doi:10.1371/journal.ppat.1013519
  year: 2025
  title: The antifungal mechanism of EntV-derived peptides is associated with a reduction
    in extracellular vesicle release
steps:
- step_id: 1
  claim: Бактерии Enterococcus faecalis секретирует вещество, которое ингибирует морфогенез
    грибов C. albicans в биопленке
  sources:
  - type: image
    source: 'doi: 10.1128/IAI.00914-12'
    snippet_or_summary: Количественная оценка клеточной морфологии Candida albicans
      показала, что 72% клеток, выращенных в отсутствие супернатанта E. faecalis,
      находились в гифальной форме, и эта доля снижалась до 30% в присутствии супернатанта.
      Таким образом, секретируемое бактериальное соединение ингибирует рост гиф, связанных
      с биопленкой.
    locator: Figure 7E
  conditions:
    system: Биопленки C. albicans; супернатант E. faecalis
    environment: ''
    protocol: C. albicans (штамм SC5314) разбавляли в буферной среде Spider с 20%
      сыворотки с добавлением или без добавления E. faecalis и инкубировали при 37°C
      в течение 24 часов. Для микроскопического исследования биопленки C. albicans
      аккуратно промывали в PBS и окрашивали 35 мкг/мл кальцефлуора белого в течение
      5 минут в темноте.
    notes: ''
  inference: Существует внеклеточный фактор бактериального происхождения, который
    влияет на Candida albicans
  next_question: Что именно представляет из себя этот фактор?
- step_id: 2
  claim: Бактерии E. faecalis продуцируют небольшой белок EntV, который является ингибитором
    способности C. albicans к образованию биопленок
  sources:
  - type: text
    source: 'doi: 10.1073/pnas.1620432114'
    snippet_or_summary: Белок EntV, продуцируемый из локуса entV ( ef1097 ), является
      необходимым и достаточным для снижения вирулентности и образования биопленок
      C. albicans за счет ингибирования образования гиф, критически важного признака
      вирулентности.
  conditions:
    system: Биопленки C. albicans SC5314; синтетический белок EntV
    environment: unknown
    protocol: Биопленки C. albicans выращивали при 30 °C в среде YPD в течение 15
      ч в 96-луночном планшете с возрастающими концентрациями sEntV 68 , а оптическую
      плотность при 600 нм измеряли с помощью микропланшетного ридера. Снижение образования
      гиф оценивали с помощью репортерного штамма GFP под контролем специфичного для
      гиф гена HWP1
    notes: ''
  inference: Секретируемый фактор E. faecalis был идентифицирован как белок EntV
  next_question: За счет чего белок активен?
- step_id: 3
  claim: Противогрибковая активность белка EntV полностью обусловлена ​​последовательностью
    из 12 аминокислот α7-спирали
  sources:
  - type: image
    source: doi:10.1038/s41467-022-33613-1
    snippet_or_summary: На рисунке показана выживаемость Caenorhabditis elegans, инфицированных
      C. albicans и подвергнутых воздействию 1 нМ указанного фрагмента α7. 12-мер
      α7-спирали, сохраняющий полные три витка α-спирали и заканчивающийся цистеином-167,
      столь же эффективен в защите от инфекции C. albicans в модели червя и ингибировании
      адгезии к поверхности, как и полноразмерный EntV.
    locator: Figure 3
  conditions:
    system: нематоды Caenorhabditis elegans; уко
    environment: unknown
    protocol: Червей заражали, помещая их на грибковый газон на 4 часа при 25 °C.
      После этого их смывали с чашки Петри и промывали четыре раза 2 мл стерильного
      буфера M9. Затем нематод пипетировали (~30 на лунку, по две лунки на каждое
      условие, всего ~60 исследованных червей) в шестилуночные планшеты с 2 мл жидкой
      среды (20% бульона BHI и 80% M9), содержащей указанные концентрации исследуемых
      соединений (укороченных пептидов). Планшеты инкубировали при 25 °C, и гибель
      червей оценивали ежедневно. Кривые выживаемости Каплана–Мейера были построены
      и проанализированы.
    notes: ''
  inference: Активность белка определяется не нативной последовательностью, а определенным
    фрагментом, состоящим из 12 аминокислотных остатков.
  next_question: С какой клеточной структурой или процессом Candida albicans взаимодействуют
    EntV и его укороченный пептид и за счет чего они подавляют вирулентность?
- step_id: 4
  claim: Пептиды EntV снижают вирулентность C.albicans за счет вмешательства в биологию
    внеклеточных везикул гриба
  sources:
  - type: text
    source: 'doi: 10.1371/journal.ppat.1013519'
    snippet_or_summary: Пептиды на основе EntV связываются с клеточной оболочкой гриба
      точечным и динамическим образом, ко-локализуясь с внеклеточными везикулами (EVs),
      которые играют критическую роль в формировании грибковой биопленки и вирулентности.
      Обработка EntV значительно снижает секрецию EV у C. albicans.
  conditions:
    system: C. albicans SC5314;  EntV; пептиды на основе EntV
    environment: unknown
    protocol: Меченые флуорофором пептиды EntV68 или короткий 12-аминокислотный вариант
      инкубировали с клетками Candida albicans около 2 часов, после чего их локализацию
      анализировали методом флуоресцентной микроскопии. Для анализа внеклеточных везикул
      биопленки Candida albicans выращивали 24 часа в среде RPMI-1640 при 37°C в присутствии
      или отсутствии 12-аминокислотного пептида. Жизнеспособность клеток контролировали
      по XTT-тесту, а количество и распределение везикул по размерам определяли методом
      анализа траекторий наночастиц.
    notes: ''
  inference: Определен механизм действия, за счет которого EntV и его короткие варианты
    снижают вирулентность C.albicans
  next_question: Какие еще могут быть дополнит
