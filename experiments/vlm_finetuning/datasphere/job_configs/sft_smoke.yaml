name: vlm-sft-smoke-qwen25vl-3b-qlora

desc: Smoke SFT run for Qwen2.5-VL-3B-Instruct plus QLoRA

cmd: >
  bash experiments/vlm_finetuning/datasphere/bin/run_sft_smoke.sh

env:
  python:
    type: manual
    version: 3.10.13
    requirements-file: experiments/vlm_finetuning/datasphere/requirements.txt
    local-paths:
      - experiments/vlm_finetuning/
      - data/
      - examples/

inputs:
  - experiments/vlm_finetuning/
  - data/
  - examples/

outputs:
  - data/derived/training/vlm_sft_smoke.jsonl
  - data/derived/training/vlm_sft_eval.jsonl
  - outputs/sft_smoke_qwen25vl_3b_qlora.tar.gz

cloud-instance-types:
  - g2.1

working-storage:
  type: SSD
  size: 250Gb

graceful-shutdown:
  signal: SIGTERM
  timeout: 1800s
