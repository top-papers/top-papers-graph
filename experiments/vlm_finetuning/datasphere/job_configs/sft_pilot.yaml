name: vlm-sft-pilot-qwen3vl-4b-lora

desc: Pilot SFT run for Qwen3-VL-4B-Instruct plus LoRA

cmd: >
  bash experiments/vlm_finetuning/datasphere/bin/run_sft_pilot.sh

env:
  python:
    type: manual
    version: 3.10.13
    requirements-file: experiments/vlm_finetuning/datasphere/requirements.txt
    root-path:
      - experiments/vlm_finetuning/scripts/build_vlm_sft_dataset.py
      - experiments/vlm_finetuning/scripts/train_vlm_sft.py
    local-paths:
      - experiments/vlm_finetuning/
      - data/
      - examples/

inputs:
  - experiments/vlm_finetuning/
  - data/
  - examples/

outputs:
  - data/derived/training/vlm_sft_train.jsonl
  - data/derived/training/vlm_sft_eval.jsonl
  - outputs/sft_pilot_qwen3vl_4b_lora.tar.gz

cloud-instance-types:
  - g2.2
  - g2.4

working-storage:
  size: 500GB

graceful-shutdown:
  signal: SIGTERM
  timeout: 3600s
