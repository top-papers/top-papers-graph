name: teacher-sft-qwen3vl-30b-a3b

desc: Large-teacher SFT run for Qwen3-VL-30B-A3B-Instruct plus LoRA

cmd: >
  bash experiments/vlm_finetuning/datasphere/bin/run_teacher_sft_30b_a3b.sh

env:
  python:
    type: manual
    version: 3.10.13
    requirements-file: experiments/vlm_finetuning/datasphere/requirements.txt
    local-paths:
      - experiments/vlm_finetuning/
      - data/
      - examples/

inputs:
  - experiments/vlm_finetuning/
  - data/
  - examples/

outputs:
  - data/derived/training/vlm_sft_train.jsonl
  - data/derived/training/vlm_sft_eval.jsonl
  - outputs/teacher_sft_qwen3vl_30b_a3b_lora.tar.gz

cloud-instance-types:
  - g2.4

working-storage:
  type: SSD
  size: 700Gb

graceful-shutdown:
  signal: SIGTERM
  timeout: 7200s
