services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: top-papers-graph-app
    working_dir: /app
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      MEMGRAPH_URI: bolt://memgraph:7687
      GRAPH_BACKEND: memgraph
      GROBID_URL: http://grobid:8070
    volumes:
      - ./:/app
    depends_on:
      - qdrant
      - memgraph
    command: ["env"]

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: top-papers-graph-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: top-papers-graph-memgraph
    ports:
      - "7688:7687"
      - "7444:7444"
    command: ["--log-level=TRACE"]
    volumes:
      - memgraph_data:/var/lib/memgraph

  lab:
    image: memgraph/lab:latest
    container_name: top-papers-graph-memgraph-lab
    ports:
      - "3000:3000"
    depends_on:
      - memgraph
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687

  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: top-papers-graph-grobid
    ports:
      - "8070:8070"
    profiles: ["full"]

volumes:
  qdrant_storage:
  memgraph_data:
