services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Full-stack default: OCR + multimodal + temporal + TGN/PyG.
        INSTALL_EXTRAS: ${INSTALL_EXTRAS:-fullstack}
    image: top-papers-graph:latest
    container_name: top_papers_graph_app
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBED_PROVIDER=${EMBED_PROVIDER:-sentence-transformers}
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-m3}
      - QDRANT_RETRIEVAL_MODE=${QDRANT_RETRIEVAL_MODE:-hybrid}
      - QDRANT_DENSE_VECTOR_NAME=${QDRANT_DENSE_VECTOR_NAME:-dense}
      - QDRANT_SPARSE_VECTOR_NAME=${QDRANT_SPARSE_VECTOR_NAME:-sparse}
      - QDRANT_SPARSE_DIM=${QDRANT_SPARSE_DIM:-2048}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-please_change_me}
      - MEMGRAPH_URI=bolt://memgraph:7687
      - MEMGRAPH_USER=${MEMGRAPH_USER:-}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
      - GRAPH_BACKEND=${GRAPH_BACKEND:-dual}
      - GROBID_URL=http://grobid:8070
      - OCR_BACKEND=${OCR_BACKEND:-auto}
      - PADDLEOCR_LANG=${PADDLEOCR_LANG:-ru}
      - VLM_BACKEND=${VLM_BACKEND:-none}
      - VLM_MODEL_ID=${VLM_MODEL_ID:-Qwen/Qwen2.5-VL-3B-Instruct}
      - VLM_MAX_NEW_TOKENS=${VLM_MAX_NEW_TOKENS:-512}
      - VLM_STRUCTURED_OUTPUT=${VLM_STRUCTURED_OUTPUT:-true}
      - HYP_TGNN_BACKEND=${HYP_TGNN_BACKEND:-auto}
      - HYP_TGNN_MEMORY_DIM=${HYP_TGNN_MEMORY_DIM:-64}
      - HYP_TGNN_TIME_DIM=${HYP_TGNN_TIME_DIM:-16}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./runs:/app/runs
      - ./.cache:/app/.cache
      - ./results:/app/results
      - ./configs:/app/configs:ro
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - neo4j
      - memgraph
      - grobid

  neo4j:
    image: neo4j:5
    container_name: scireason_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-please_change_me}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data

  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: scireason_memgraph
    ports:
      - "7688:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph

  qdrant:
    image: qdrant/qdrant:latest
    container_name: scireason_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  grobid:
    image: grobid/grobid:0.8.2-crf
    container_name: scireason_grobid
    ports:
      - "8070:8070"
      - "8071:8071"
    environment:
      - JAVA_OPTS=-Xmx4g

  postgres:
    image: postgres:16
    container_name: scireason_postgres
    environment:
      - POSTGRES_USER=top_papers
      - POSTGRES_PASSWORD=top_papers
      - POSTGRES_DB=top_papers
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  memgraph_data:
  qdrant_data:
  pg_data:
